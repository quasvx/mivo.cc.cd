<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eeuu.cc.cd</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <script>
        // Redirección si entra desde el subdominio de pages.dev
        if (window.location.hostname === "mivo-cc-cd.pages.dev") {
            window.location.replace("https://eeuu.cc.cd");
        }
    </script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Fondo con el favicon repetido en cuadrícula */
            background-image: url('favicon.png');
            background-repeat: repeat;
            background-size: 16px 16px; /* Ajusta este tamaño (ej. 32px, 48px, 64px) según qué tan grandes quieras los cuadros del fondo */
            
            color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .container {
            max-width: 650px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95); /* Fondo blanco con ligera opacidad para que no se mezcle con los favicons de atrás */
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            border: 1px solid #eaeaea;
            backdrop-filter: blur(4px); /* Efecto difuminado moderno sobre el fondo repetido */
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #000;
            font-weight: 700;
        }
        p {
            font-size: 1.4rem;
            line-height: 1.6;
            color: #444;
            margin: 0 0 24px 0;
        }
        .footer {
            font-size: 1rem;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>eeuu.cc.cd</h1>
        <p>
            Despite its name, this site has no affiliation with the United States. 
            This domain is hosted on Cloudflare and is strictly used for APIs and testing purposes.
        </p>
        <div class="footer">
            Owner: quasvx
        </div>
    </div>

</body>
</html>
