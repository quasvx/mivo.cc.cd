<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eeuu.cc.cd</title>
    
    <link rel="icon" type="image/x-icon" href="https://www.google.com/s2/favicons?domain=cloudflare.com&sz=64">

    <script>
        // Redirección si entra desde el subdominio de pages.dev
        if (window.location.hostname === "mivo-cc-cd.pages.dev") {
            window.location.replace("https://eeuu.cc.cd");
        }
    </script>
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f3f4f6;
            text-align: center;
            overflow: hidden;
            background-color: #0b0f19;
        }

        /* Canvas para la malla de líneas */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 650px;
            padding: 40px;
            background: rgba(17, 24, 39, 0.7);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #fff;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #9ca3af;
            margin: 0 0 24px 0;
        }

        .footer {
            font-size: 0.9rem;
            color: #4b5563;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="container">
        <h1>eeuu.cc.cd</h1>
        <p>
            Despite its name, this site has no affiliation with the United States. <br>
            This domain is hosted on Cloudflare and is strictly used for APIs and testing purposes.
        </p>
        <div class="footer">
            Owner: quasvx
            Thanks DNSHE and Cloudflare.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');

        let points = [];
        const spacing = 45; 
        const mouse = { x: -1000, y: -1000, radius: 160 }; 

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initGrid();
        }

        function initGrid() {
            points = [];
            for (let x = 0; x < canvas.width + spacing; x += spacing) {
                for (let y = 0; y < canvas.height + spacing; y += spacing) {
                    points.push({ ox: x, oy: y, x: x, y: y });
                }
            }
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            points.forEach(p => {
                const dx = mouse.x - p.ox;
                const dy = mouse.y - p.oy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                let targetX = p.ox;
                let targetY = p.oy;

                if (dist < mouse.radius) {
                    const force = (mouse.radius - dist) / mouse.radius;
                    targetX = p.ox - (dx / dist) * force * 40; 
                    targetY = p.oy - (dy / dist) * force * 40;
                }

                p.x += (targetX - p.x) * 0.08;
                p.y += (targetY - p.y) * 0.08;
            });

            ctx.strokeStyle = 'rgba(59, 130, 246, 0.08)'; 
            ctx.lineWidth = 1;

            const rows = Math.ceil((canvas.height + spacing) / spacing);

            for (let i = 0; i < points.length; i++) {
                const nextCol = i + rows;
                const nextRow = i + 1;

                if (nextCol < points.length && points[i].ox < points[nextCol].ox) {
                    ctx.beginPath();
                    ctx.moveTo(points[i].x, points[i].y);
                    ctx.lineTo(points[nextCol].x, points[nextCol].y);
                    ctx.stroke();
                }
                if (nextRow < points.length && (i % rows) < rows - 1) {
                    ctx.beginPath();
                    ctx.moveTo(points[i].x, points[i].y);
                    ctx.lineTo(points[nextRow].x, points[nextRow].y);
                    ctx.stroke();
                }
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
